services:
  app:
    build:
      context: .
      target: development
    command: npm run dev
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-moderato}:${POSTGRES_PASSWORD:-moderato_dev_password}@db:5432/${POSTGRES_DB:-moderato}?schema=public
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-moderato}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-moderato_dev_password}
      POSTGRES_USER: ${POSTGRES_USER:-moderato}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  app_node_modules:
  postgres_data:
