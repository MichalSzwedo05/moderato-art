services:
  app:
    image: ${APP_IMAGE:?APP_IMAGE must be set}
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-https://cloud.langfuse.com}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_RELEASE: ${LANGFUSE_RELEASE:-unknown}
      LANGFUSE_SAMPLE_RATE: ${LANGFUSE_SAMPLE_RATE:-0.2}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_TRACING_ENVIRONMENT: ${LANGFUSE_TRACING_ENVIRONMENT:-production}
      NEXT_PUBLIC_SITE_URL: https://${SITE_DOMAIN:?SITE_DOMAIN must be set}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - frontend
      - database

  db:
    image: postgres:17.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - database
    volumes:
      - postgres_data:/var/lib/postgresql/data

  caddy:
    image: caddy:2.10.0-alpine
    restart: unless-stopped
    environment:
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL must be set}
      SITE_DOMAIN: ${SITE_DOMAIN:?SITE_DOMAIN must be set}
    depends_on:
      app:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    networks:
      - frontend
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

networks:
  frontend:
  database:
    internal: true

volumes:
  caddy_config:
  caddy_data:
  postgres_data:
